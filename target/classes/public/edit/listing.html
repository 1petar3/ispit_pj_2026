<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Izmeni oglas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body data-bs-theme="dark">
<div class="container">
    <nav class="navbar navbar-expand-lg bg-body-tertiary mb-3 mt-2">
        <div class="container-fluid">
            <a class="navbar-brand" href="/index.html">PolovniMini</a>
        </div>
    </nav>

    <h3>Izmeni oglas</h3>

    <form id="form">
        <div class="mb-3">
            <label for="id" class="form-label">ID:</label>
            <input type="text" class="form-control" id="id" disabled>
        </div>
        <div class="mb-3">
            <label for="sellerId" class="form-label">Prodavac:</label>
            <select class="form-select" id="sellerId"></select>
        </div>
        <div class="mb-3">
            <label for="carId" class="form-label">Auto:</label>
            <select class="form-select" id="carId"></select>
        </div>
        <div class="mb-3">
            <label for="priceEur" class="form-label">Cena:</label>
            <input type="number" class="form-control" id="priceEur">
        </div>
        <div class="mb-3">
            <label for="city" class="form-label">Grad:</label>
            <input type="text" class="form-control" id="city">
        </div>

        <div class="form-check mb-2">
            <input class="form-check-input" type="checkbox" id="active">
            <label class="form-check-label" for="active">Aktivan</label>
        </div>

        <div class="form-check mb-3">
            <input class="form-check-input" type="checkbox" id="sold">
            <label class="form-check-label" for="sold">Prodat</label>
        </div>

        <div class="mb-3">
            <label for="description" class="form-label">Opis:</label>
            <textarea class="form-control" id="description"></textarea>
        </div>

        <div class="mb-3">
            <label for="publishedAt" class="form-label">Objavljeno:</label>
            <input type="datetime-local" class="form-control" id="publishedAt" disabled>
        </div>

        <button type="submit" class="btn btn-success">Sačuvaj</button>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="/js/global.js"></script>
<script>
    const listingId = getIdFromQuery()
    const activeInput = document.getElementById('active')
    const soldInput = document.getElementById('sold')

    soldInput.addEventListener('change', () => {
        if (soldInput.checked) {
            activeInput.checked = false
        }
    })

    activeInput.addEventListener('change', () => {
        if (activeInput.checked) {
            soldInput.checked = false
        }
    })

    function loadSellers(selectedId) {
        axios.get('/api/seller')
            .then(rsp => {
                const sellerSelect = document.getElementById('sellerId')
                sellerSelect.innerHTML = ''

                rsp.data.forEach(seller => {
                    const option = document.createElement('option')
                    option.value = seller.sellerId
                    option.text = (seller.firstName ?? '') + ' ' + (seller.lastName ?? '')

                    if (Number(seller.sellerId) === Number(selectedId)) {
                        option.selected = true
                    }

                    sellerSelect.appendChild(option)
                })
            })
            .catch(() => alert('Doslo je do greske'))
    }

    function loadCars(selectedId) {
        axios.get('/api/car')
            .then(rsp => {
                const carSelect = document.getElementById('carId')
                carSelect.innerHTML = ''

                rsp.data.forEach(car => {
                    const option = document.createElement('option')
                    option.value = car.carId
                    option.text = (car.make ?? '') + ' ' + (car.model ?? '')

                    if (Number(car.carId) === Number(selectedId)) {
                        option.selected = true
                    }

                    carSelect.appendChild(option)
                })
            })
            .catch(() => alert('Doslo je do greske'))
    }

    axios.get('/api/listing/' + listingId)
        .then(rsp => {
            const listing = rsp.data

            document.getElementById('id').value = listing.listingId
            document.getElementById('priceEur').value = listing.priceEur
            document.getElementById('city').value = listing.city
            document.getElementById('active').checked = listing.active === true
            document.getElementById('sold').checked = listing.sold === true
            document.getElementById('description').value = listing.description ?? ''
            document.getElementById('publishedAt').value = toDateTimeLocal(listing.publishedAt)

            loadSellers(listing.seller?.sellerId)
            loadCars(listing.car?.carId)
        })
        .catch(() => alert('Doslo je do greske'))

    document.getElementById('form').addEventListener('submit', e => {
        e.preventDefault()

        const sellerId = parseInt(document.getElementById('sellerId').value)
        const carId = parseInt(document.getElementById('carId').value)
        const priceEur = parseInt(document.getElementById('priceEur').value)
        const city = document.getElementById('city').value.trim()
        const description = document.getElementById('description').value.trim()
        const active = document.getElementById('active').checked
        const sold = document.getElementById('sold').checked

        if (!priceEur || priceEur <= 0) {
            alert('Cena mora biti veća od 0.')
            return
        }

        if (city.length === 0) {
            alert('Grad ne sme biti prazan.')
            return
        }

        if (description.length < 3) {
            alert('Opis mora imati najmanje 3 karaktera.')
            return
        }

        axios.put('/api/listing/' + listingId, {
            sellerId: sellerId,
            carId: carId,
            priceEur: priceEur,
            city: city,
            active: active,
            sold: sold,
            description: description
        }).then(() => {
            alert('Oglas je uspešno sačuvan.')
            window.location.href = '/list.html'
        }).catch(() => alert('Doslo je do greske'))
    })
</script>
</body>
</html>
