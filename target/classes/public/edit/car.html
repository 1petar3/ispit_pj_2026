<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Izmeni auto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body data-bs-theme="dark">
<div class="container">
    <nav class="navbar navbar-expand-lg bg-body-tertiary mb-3 mt-2">
        <div class="container-fluid">
            <a class="navbar-brand" href="/index.html">PolovniMini</a>
        </div>
    </nav>

    <h3>Izmeni auto</h3>

    <form id="form">
        <div class="mb-3">
            <label for="id" class="form-label">ID:</label>
            <input type="text" class="form-control" id="id" disabled>
        </div>

        <div class="mb-3">
            <label for="make" class="form-label">Marka:</label>
            <input type="text" class="form-control" id="make" required>
        </div>

        <div class="mb-3">
            <label for="model" class="form-label">Model:</label>
            <input type="text" class="form-control" id="model" required>
        </div>

        <div class="mb-3">
            <label for="year" class="form-label">Godište:</label>
            <input type="number" class="form-control" id="year" required>
        </div>

        <div class="mb-3">
            <label for="fuelType" class="form-label">Gorivo:</label>
            <input type="text" class="form-control" id="fuelType" required>
        </div>

        <div class="mb-3">
            <label for="mileageKm" class="form-label">Kilometraža:</label>
            <input type="number" class="form-control" id="mileageKm" required>
        </div>

        <button type="submit" class="btn btn-success">Sačuvaj</button>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script>
    const carId = new URLSearchParams(window.location.search).get('id')

    axios.get('/api/car/' + carId)
        .then(rsp => {
            const car = rsp.data

            document.getElementById('id').value = car.carId
            document.getElementById('make').value = car.make ?? ''
            document.getElementById('model').value = car.model ?? ''
            document.getElementById('year').value = car.year ?? ''
            document.getElementById('fuelType').value = car.fuelType ?? ''
            document.getElementById('mileageKm').value = car.mileageKm ?? ''
        })
        .catch(() => alert('Doslo je do greske'))

    document.getElementById('form').addEventListener('submit', e => {
        e.preventDefault()

        const make = document.getElementById('make').value.trim()
        const model = document.getElementById('model').value.trim()
        const year = parseInt(document.getElementById('year').value)
        const fuelType = document.getElementById('fuelType').value.trim()
        const mileageKm = parseInt(document.getElementById('mileageKm').value)

        if (make.length < 2) {
            alert('Marka mora imati najmanje 2 karaktera.')
            return
        }

        if (model.length < 1) {
            alert('Model ne sme biti prazan.')
            return
        }

        if (!year || year < 1950) {
            alert('Godište nije ispravno.')
            return
        }

        if (!mileageKm || mileageKm < 0) {
            alert('Kilometraža nije ispravna.')
            return
        }

        axios.put('/api/car/' + carId, {
            make: make,
            model: model,
            year: year,
            fuelType: fuelType,
            mileageKm: mileageKm
        }).then(() => {
            alert('Automobil je uspešno sačuvan.')
            window.location.href = '/car.html'
        }).catch(() => alert('Doslo je do greske'))
    })
</script>
</body>
</html>
