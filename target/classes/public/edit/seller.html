<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Izmeni prodavca</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body data-bs-theme="dark">
<div class="container">
    <h3 class="mt-3 mb-3">Izmeni prodavca</h3>

    <form id="form">
        <div class="mb-3">
            <label class="form-label" for="id">ID</label>
            <input class="form-control" type="text" id="id" disabled>
        </div>

        <div class="mb-3">
            <label class="form-label" for="firstName">Ime</label>
            <input class="form-control" type="text" id="firstName" required>
        </div>

        <div class="mb-3">
            <label class="form-label" for="lastName">Prezime</label>
            <input class="form-control" type="text" id="lastName" required>
        </div>

        <div class="mb-3">
            <label class="form-label" for="email">Email</label>
            <input class="form-control" type="email" id="email" required>
        </div>

        <div class="mb-3">
            <label class="form-label" for="phone">Telefon</label>
            <input class="form-control" type="text" id="phone" required>
        </div>

        <div class="mb-3">
            <label class="form-label" for="umcn">JMBG</label>
            <input class="form-control" type="text" id="umcn">
        </div>

        <div class="mb-3">
            <label class="form-label" for="taxId">PIB</label>
            <input class="form-control" type="text" id="taxId">
        </div>

        <button class="btn btn-success" type="submit">Sačuvaj</button>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script>
    const sellerId = new URLSearchParams(window.location.search).get('id')

    axios.get('/api/seller/' + sellerId)
        .then(rsp => {
            const seller = rsp.data

            document.getElementById('id').value = seller.sellerId
            document.getElementById('firstName').value = seller.firstName ?? ''
            document.getElementById('lastName').value = seller.lastName ?? ''
            document.getElementById('email').value = seller.email ?? ''
            document.getElementById('phone').value = seller.phone ?? ''
            document.getElementById('umcn').value = seller.umcn ?? ''
            document.getElementById('taxId').value = seller.taxId ?? ''
        })
        .catch(() => alert('Doslo je do greske'))

    document.getElementById('form').addEventListener('submit', e => {
        e.preventDefault()

        axios.put('/api/seller/' + sellerId, {
            firstName: document.getElementById('firstName').value.trim(),
            lastName: document.getElementById('lastName').value.trim(),
            email: document.getElementById('email').value.trim(),
            phone: document.getElementById('phone').value.trim(),
            umcn: document.getElementById('umcn').value.trim(),
            taxId: document.getElementById('taxId').value.trim()
        }).then(() => {
            window.location.href = '/seller.html'
        }).catch(() => alert('Doslo je do greske'))
    })
</script>
</body>
</html>
