<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dodaj automobil</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body data-bs-theme="dark">
<div class="container">
    <h3 class="mt-3 mb-3">Dodaj automobil</h3>

    <form id="form">
        <div class="mb-3">
            <label class="form-label" for="make">Marka</label>
            <input class="form-control" type="text" id="make" required>
        </div>

        <div class="mb-3">
            <label class="form-label" for="model">Model</label>
            <input class="form-control" type="text" id="model" required>
        </div>

        <div class="mb-3">
            <label class="form-label" for="year">Godište</label>
            <input class="form-control" type="number" id="year" required>
        </div>

        <div class="mb-3">
            <label class="form-label" for="mileageKm">Kilometraža</label>
            <input class="form-control" type="number" id="mileageKm" required>
        </div>

        <div class="mb-3">
            <label class="form-label" for="fuelType">Gorivo</label>
            <input class="form-control" type="text" id="fuelType">
        </div>

        <div class="mb-3">
            <label class="form-label" for="transmission">Menjač</label>
            <input class="form-control" type="text" id="transmission">
        </div>

        <div class="mb-3">
            <label class="form-label" for="engine">Motor</label>
            <input class="form-control" type="text" id="engine">
        </div>

        <button class="btn btn-success" type="submit">Sačuvaj</button>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script>
    document.getElementById('form').addEventListener('submit', e => {
        e.preventDefault()

        axios.post('/api/car', {
            make: document.getElementById('make').value.trim(),
            model: document.getElementById('model').value.trim(),
            year: parseInt(document.getElementById('year').value),
            mileageKm: parseInt(document.getElementById('mileageKm').value),
            fuelType: document.getElementById('fuelType').value.trim(),
            transmission: document.getElementById('transmission').value.trim(),
            engine: document.getElementById('engine').value.trim()
        }).then(() => {
            window.location.href = '/car.html'
        }).catch(() => alert('Doslo je do greske'))
    })
</script>
</body>
</html>
