<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dodaj oglas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body data-bs-theme="dark">
<div class="container">
    <nav class="navbar navbar-expand-lg bg-body-tertiary mb-3 mt-2">
        <div class="container-fluid">
            <a class="navbar-brand" href="/index.html">PolovniMini</a>
        </div>
    </nav>

    <h3>Dodaj oglas</h3>

    <form id="form">
        <div class="mb-3">
            <label for="sellerId" class="form-label">Prodavac:</label>
            <select class="form-select" id="sellerId"></select>
        </div>

        <div class="mb-3">
            <label for="carId" class="form-label">Auto:</label>
            <select class="form-select" id="carId"></select>
        </div>

        <div class="mb-3">
            <label for="priceEur" class="form-label">Cena:</label>
            <input type="number" class="form-control" id="priceEur" required>
        </div>

        <div class="mb-3">
            <label for="city" class="form-label">Grad:</label>
            <input type="text" class="form-control" id="city" required>
        </div>

        <div class="mb-3">
            <label for="description" class="form-label">Opis:</label>
            <textarea class="form-control" id="description" rows="4"></textarea>
        </div>

        <button type="submit" class="btn btn-success">Sačuvaj</button>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script>
    axios.get('/api/seller')
        .then(rsp => {
            rsp.data.forEach(seller => {
                const option = document.createElement('option')
                option.value = seller.sellerId
                option.text = (seller.firstName ?? '') + ' ' + (seller.lastName ?? '')
                document.getElementById('sellerId').appendChild(option)
            })
        })
        .catch(() => alert('Doslo je do greske pri ucitavanju prodavaca'))

    axios.get('/api/car')
        .then(rsp => {
            rsp.data.forEach(car => {
                const option = document.createElement('option')
                option.value = car.carId
                option.text = (car.make ?? '') + ' ' + (car.model ?? '')
                document.getElementById('carId').appendChild(option)
            })
        })
        .catch(() => alert('Doslo je do greske pri ucitavanju automobila'))

    document.getElementById('form').addEventListener('submit', e => {
        e.preventDefault()

        const sellerId = parseInt(document.getElementById('sellerId').value)
        const carId = parseInt(document.getElementById('carId').value)
        const priceEur = parseInt(document.getElementById('priceEur').value)
        const city = document.getElementById('city').value.trim()
        const description = document.getElementById('description').value.trim()

        if (!priceEur || priceEur <= 0) {
            alert('Cena mora biti veća od 0.')
            return
        }

        if (city.length === 0) {
            alert('Grad ne sme biti prazan.')
            return
        }

        if (description.length < 3) {
            alert('Opis mora imati najmanje 3 karaktera.')
            return
        }

        axios.post('/api/listing', {
            sellerId: sellerId,
            carId: carId,
            priceEur: priceEur,
            city: city,
            description: description
        }).then(() => {
            alert('Oglas je uspešno sačuvan.')
            window.location.href = '/list.html'
        }).catch(() => alert('Doslo je do greske'))
    })
</script>
</body>
</html>
