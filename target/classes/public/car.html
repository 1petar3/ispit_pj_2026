<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automobili</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body data-bs-theme="dark">
<div class="container">
    <nav class="navbar navbar-expand-lg bg-body-tertiary mb-3 mt-2">
        <div class="container-fluid">
            <a class="navbar-brand" href="/index.html">PolovniMini</a>
            <div class="navbar-nav">
                <a class="nav-link" href="/index.html">Početna</a>
                <a class="nav-link" href="/list.html">Lista</a>
                <a class="nav-link" href="/seller.html">Prodavci</a>
                <a class="nav-link active" href="/car.html">Automobili</a>
            </div>
        </div>
    </nav>

    <a href="/new/car.html" class="btn btn-primary mb-3">Dodaj auto</a>

    <table class="table table-striped table-hover">
        <thead>
        <tr>
            <th>ID</th>
            <th>Marka</th>
            <th>Model</th>
            <th>Godište</th>
            <th>Kilometraža</th>
            <th>Opcije</th>
        </tr>
        </thead>
        <tbody id="content"></tbody>
    </table>
</div>

<template id="template">
    <tr>
        <td class="id"></td>
        <td class="make"></td>
        <td class="model"></td>
        <td class="year"></td>
        <td class="mileageKm"></td>
        <td>
            <a href="#" class="btn btn-sm btn-success edit">Izmeni</a>
            <button class="btn btn-sm btn-danger delete">Obriši</button>
        </td>
    </tr>
</template>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script>
    const content = document.getElementById('content')
    const template = document.getElementById('template')

    axios.get('/api/car')
        .then(rsp => {
            rsp.data.forEach(car => {
                const copy = template.content.cloneNode(true)

                copy.querySelector('.id').innerText = car.carId
                copy.querySelector('.make').innerText = car.make
                copy.querySelector('.model').innerText = car.model
                copy.querySelector('.year').innerText = car.year
                copy.querySelector('.mileageKm').innerText = car.mileageKm
                copy.querySelector('.edit').href = '/edit/car.html?id=' + car.carId

                copy.querySelector('.delete').addEventListener('click', () => {
                    axios.delete('/api/car/' + car.carId)
                        .then(() => window.location.reload())
                        .catch(() => alert('Doslo je do greske'))
                })

                content.appendChild(copy)
            })
        })
        .catch(() => alert('Doslo je do greske'))
</script>
</body>
</html>
