<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automobili</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
</head>
<body data-bs-theme="dark">
<div class="container">
    <nav class="navbar navbar-expand-lg bg-body-tertiary mb-4 mt-2">
        <div class="container-fluid">
            <a class="navbar-brand" href="/index.html">
                <i class="fa-solid fa-car"></i> PolovniMini
            </a>

            <div class="navbar-nav">
                <a class="nav-link" href="/index.html">
                    <i class="fa-solid fa-house"></i> Početna
                </a>
                <a class="nav-link" href="/list.html">
                    <i class="fa-solid fa-table-cells"></i> Lista
                </a>
                <a class="nav-link" href="/seller.html">
                    <i class="fa-solid fa-user"></i> Prodavci
                </a>
                <a class="nav-link active" href="/car.html">
                    <i class="fa-solid fa-car-side"></i> Automobili
                </a>
            </div>
        </div>
    </nav>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3 class="mb-0">Automobili</h3>
        <a href="/new/car.html" class="btn btn-primary">Dodaj automobil</a>
    </div>

    <table class="table table-striped table-hover align-middle">
        <thead>
        <tr>
            <th>ID</th>
            <th>Marka</th>
            <th>Model</th>
            <th>Godište</th>
            <th>Kilometraža</th>
            <th>Gorivo</th>
            <th>Menjač</th>
            <th>Motor</th>
            <th>Opcije</th>
        </tr>
        </thead>
        <tbody id="content"></tbody>
    </table>
</div>

<template id="template">
    <tr>
        <td class="id"></td>
        <td class="make"></td>
        <td class="model"></td>
        <td class="year"></td>
        <td class="mileageKm"></td>
        <td class="fuelType"></td>
        <td class="transmission"></td>
        <td class="engine"></td>
        <td>
            <a href="#" class="btn btn-sm btn-success edit">Izmeni</a>
            <button class="btn btn-sm btn-danger delete">Obriši</button>
        </td>
    </tr>
</template>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script>
    const content = document.getElementById('content')
    const template = document.getElementById('template')

    axios.get('/api/car')
        .then(rsp => {
            content.innerHTML = ''

            rsp.data.forEach(car => {
                const copy = template.content.cloneNode(true)

                copy.querySelector('.id').innerText = car.carId ?? ''
                copy.querySelector('.make').innerText = car.make ?? ''
                copy.querySelector('.model').innerText = car.model ?? ''
                copy.querySelector('.year').innerText = car.year ?? ''
                copy.querySelector('.mileageKm').innerText = car.mileageKm ?? ''
                copy.querySelector('.fuelType').innerText = car.fuelType ?? ''
                copy.querySelector('.transmission').innerText = car.transmission ?? ''
                copy.querySelector('.engine').innerText = car.engine ?? ''
                copy.querySelector('.edit').href = '/edit/car.html?id=' + car.carId

                copy.querySelector('.delete').addEventListener('click', () => {
                    const confirmed = confirm('Da li ste sigurni da želite da obrišete automobil?')

                    if (!confirmed) {
                        return
                    }

                    axios.delete('/api/car/' + car.carId)
                        .then(() => window.location.reload())
                        .catch(() => alert('Doslo je do greske pri brisanju'))
                })

                content.appendChild(copy)
            })
        })
        .catch(() => alert('Doslo je do greske pri ucitavanju automobila'))
</script>
</body>
</html>
