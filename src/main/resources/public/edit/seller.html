<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Izmeni prodavca</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body data-bs-theme="dark">
<div class="container">
    <nav class="navbar navbar-expand-lg bg-body-tertiary mb-3 mt-2">
        <div class="container-fluid">
            <a class="navbar-brand" href="/index.html">PolovniMini</a>
        </div>
    </nav>

    <h3>Izmeni prodavca</h3>

    <form id="form">
        <div class="mb-3">
            <label for="id" class="form-label">ID:</label>
            <input type="text" class="form-control" id="id" disabled>
        </div>

        <div class="mb-3">
            <label for="firstName" class="form-label">Ime:</label>
            <input type="text" class="form-control" id="firstName" required>
        </div>

        <div class="mb-3">
            <label for="lastName" class="form-label">Prezime:</label>
            <input type="text" class="form-control" id="lastName" required>
        </div>

        <div class="mb-3">
            <label for="email" class="form-label">Email:</label>
            <input type="email" class="form-control" id="email" required>
        </div>

        <div class="mb-3">
            <label for="phone" class="form-label">Telefon:</label>
            <input type="text" class="form-control" id="phone" required>
        </div>

        <button type="submit" class="btn btn-success">Sačuvaj</button>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script>
    const sellerId = new URLSearchParams(window.location.search).get('id')

    axios.get('/api/seller/' + sellerId)
        .then(rsp => {
            const seller = rsp.data

            document.getElementById('id').value = seller.sellerId
            document.getElementById('firstName').value = seller.firstName ?? ''
            document.getElementById('lastName').value = seller.lastName ?? ''
            document.getElementById('email').value = seller.email ?? ''
            document.getElementById('phone').value = seller.phone ?? ''
        })
        .catch(() => alert('Doslo je do greske'))

    document.getElementById('form').addEventListener('submit', e => {
        e.preventDefault()

        const firstName = document.getElementById('firstName').value.trim()
        const lastName = document.getElementById('lastName').value.trim()
        const email = document.getElementById('email').value.trim()
        const phone = document.getElementById('phone').value.trim()

        if (firstName.length < 2) {
            alert('Ime mora imati najmanje 2 karaktera.')
            return
        }

        if (lastName.length < 2) {
            alert('Prezime mora imati najmanje 2 karaktera.')
            return
        }

        if (phone.length < 3) {
            alert('Telefon nije ispravan.')
            return
        }

        axios.put('/api/seller/' + sellerId, {
            firstName: firstName,
            lastName: lastName,
            email: email,
            phone: phone
        }).then(() => {
            alert('Prodavac je uspešno sačuvan.')
            window.location.href = '/seller.html'
        }).catch(() => alert('Doslo je do greske'))
    })
</script>
</body>
</html>
