<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Izmeni auto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body data-bs-theme="dark">
<div class="container">
    <nav class="navbar navbar-expand-lg bg-body-tertiary mb-3 mt-2">
        <div class="container-fluid">
            <a class="navbar-brand" href="/index.html">PolovniMini</a>
        </div>
    </nav>

    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/index.html">Home</a></li>
            <li class="breadcrumb-item"><a href="/car.html">Automobili</a></li>
            <li class="breadcrumb-item active">Izmeni</li>
        </ol>
    </nav>

    <h3>Izmeni auto</h3>

    <form id="form">
        <div class="mb-3">
            <label for="id" class="form-label">ID:</label>
            <input type="text" class="form-control" id="id" disabled>
        </div>
        <div class="mb-3">
            <label for="make" class="form-label">Marka:</label>
            <input type="text" class="form-control" id="make">
        </div>
        <div class="mb-3">
            <label for="model" class="form-label">Model:</label>
            <input type="text" class="form-control" id="model">
        </div>
        <div class="mb-3">
            <label for="year" class="form-label">Godište:</label>
            <input type="number" class="form-control" id="year">
        </div>
        <div class="mb-3">
            <label for="mileageKm" class="form-label">Kilometraža:</label>
            <input type="number" class="form-control" id="mileageKm">
        </div>
        <div class="mb-3">
            <label for="fuelType" class="form-label">Gorivo:</label>
            <input type="text" class="form-control" id="fuelType">
        </div>
        <div class="mb-3">
            <label for="transmission" class="form-label">Menjač:</label>
            <input type="text" class="form-control" id="transmission">
        </div>
        <div class="mb-3">
            <label for="engine" class="form-label">Motor:</label>
            <input type="text" class="form-control" id="engine">
        </div>

        <button type="submit" class="btn btn-success">Sačuvaj</button>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="/js/global.js"></script>
<script>
    const carId = getIdFromQuery()

    axios.get('/api/car/' + carId)
        .then(rsp => {
            const car = rsp.data
            document.getElementById('id').value = car.carId
            document.getElementById('make').value = car.make
            document.getElementById('model').value = car.model
            document.getElementById('year').value = car.year
            document.getElementById('mileageKm').value = car.mileageKm
            document.getElementById('fuelType').value = car.fuelType
            document.getElementById('transmission').value = car.transmission
            document.getElementById('engine').value = car.engine
        })
        .catch(() => alert('Doslo je do greske'))

    document.getElementById('form').addEventListener('submit', e => {
        e.preventDefault()

        axios.put('/api/car/' + carId, {
            make: document.getElementById('make').value,
            model: document.getElementById('model').value,
            year: parseInt(document.getElementById('year').value),
            mileageKm: parseInt(document.getElementById('mileageKm').value),
            fuelType: document.getElementById('fuelType').value,
            transmission: document.getElementById('transmission').value,
            engine: document.getElementById('engine').value
        }).then(() => {
            window.location.href = '/car.html'
        }).catch(() => alert('Doslo je do greske'))
    })
</script>
</body>
</html>
