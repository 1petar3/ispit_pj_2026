<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dodaj oglas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body data-bs-theme="dark">
<div class="container">
    <nav class="navbar navbar-expand-lg bg-body-tertiary mb-3 mt-2">
        <div class="container-fluid">
            <a class="navbar-brand" href="/index.html">PolovniMini</a>
        </div>
    </nav>

    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/index.html">Home</a></li>
            <li class="breadcrumb-item"><a href="/list.html">Oglasi</a></li>
            <li class="breadcrumb-item active">Dodaj</li>
        </ol>
    </nav>

    <h3>Dodaj oglas</h3>

    <form id="form">
        <div class="mb-3">
            <label for="sellerId" class="form-label">Prodavac:</label>
            <select class="form-select" id="sellerId"></select>
        </div>
        <div class="mb-3">
            <label for="carId" class="form-label">Auto:</label>
            <select class="form-select" id="carId"></select>
        </div>
        <div class="mb-3">
            <label for="priceEur" class="form-label">Cena:</label>
            <input type="number" class="form-control" id="priceEur">
        </div>
        <div class="mb-3">
            <label for="city" class="form-label">Grad:</label>
            <input type="text" class="form-control" id="city">
        </div>
        <div class="mb-3">
            <label for="status" class="form-label">Status:</label>
            <input type="text" class="form-control" id="status" value="ACTIVE">
        </div>
        <div class="mb-3">
            <label for="description" class="form-label">Opis:</label>
            <textarea class="form-control" id="description"></textarea>
        </div>
        <div class="mb-3">
            <label for="publishedAt" class="form-label">Objavljeno:</label>
            <input type="datetime-local" class="form-control" id="publishedAt">
        </div>

        <button type="submit" class="btn btn-success">Sačuvaj</button>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script>
    axios.get('/api/seller')
        .then(rsp => {
            rsp.data.forEach(seller => {
                const option = document.createElement('option')
                option.value = seller.sellerId
                option.text = seller.firstName + ' ' + seller.lastName
                document.getElementById('sellerId').appendChild(option)
            })
        })

    axios.get('/api/car')
        .then(rsp => {
            rsp.data.forEach(car => {
                const option = document.createElement('option')
                option.value = car.carId
                option.text = car.make + ' ' + car.model
                document.getElementById('carId').appendChild(option)
            })
        })

    document.getElementById('form').addEventListener('submit', e => {
        e.preventDefault()

        axios.post('/api/listing', {
            sellerId: parseInt(document.getElementById('sellerId').value),
            carId: parseInt(document.getElementById('carId').value),
            priceEur: parseInt(document.getElementById('priceEur').value),
            city: document.getElementById('city').value,
            status: document.getElementById('status').value,
            description: document.getElementById('description').value,
            publishedAt: document.getElementById('publishedAt').value || null
        }).then(() => {
            window.location.href = '/list.html'
        }).catch(() => alert('Doslo je do greske'))
    })
</script>
</body>
</html>
