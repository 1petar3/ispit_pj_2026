<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalji oglasa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body data-bs-theme="dark">
<div class="container">
    <nav class="navbar navbar-expand-lg bg-body-tertiary mb-3 mt-2">
        <div class="container-fluid">
            <a class="navbar-brand" href="/index.html">PolovniMini</a>
        </div>
    </nav>

    <div class="card">
        <div class="card-body">
            <h3 id="title"></h3>
            <p><b>Prodavac:</b> <span id="seller"></span></p>
            <p><b>Cena:</b> <span id="price"></span></p>
            <p><b>Grad:</b> <span id="city"></span></p>
            <p><b>Status:</b> <span id="status"></span></p>
            <p><b>Opis:</b> <span id="description"></span></p>
            <p><b>Objavljeno:</b> <span id="publishedAt"></span></p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="/js/global.js"></script>
<script>
    const id = getIdFromQuery()

    axios.get('/api/listing/' + id)
        .then(rsp => {
            const listing = rsp.data
            document.getElementById('title').innerText = getListingTitle(listing)
            document.getElementById('seller').innerText = getSellerTitle(listing)
            document.getElementById('price').innerText = formatPrice(listing.priceEur)
            document.getElementById('city').innerText = listing.city
            document.getElementById('status').innerText = listing.status
            document.getElementById('description').innerText = listing.description
            document.getElementById('publishedAt').innerText = formatDate(listing.publishedAt)
        })
        .catch(() => alert('Doslo je do greske'))
</script>
</body>
</html>
