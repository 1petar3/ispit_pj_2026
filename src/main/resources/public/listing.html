<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalji oglasa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
</head>
<body data-bs-theme="dark">
<div class="container">
    <nav class="navbar navbar-expand-lg bg-body-tertiary mb-4 mt-2">
        <div class="container-fluid">
            <a class="navbar-brand" href="/index.html">
                <i class="fa-solid fa-car"></i> PolovniMini
            </a>

            <div class="navbar-nav">
                <a class="nav-link" href="/index.html">
                    <i class="fa-solid fa-house"></i> Početna
                </a>
                <a class="nav-link" href="/list.html">
                    <i class="fa-solid fa-table-cells"></i> Lista
                </a>
                <a class="nav-link" href="/seller.html">
                    <i class="fa-solid fa-user"></i> Prodavci
                </a>
                <a class="nav-link" href="/car.html">
                    <i class="fa-solid fa-car-side"></i> Automobili
                </a>
            </div>
        </div>
    </nav>

    <div class="row justify-content-center">
        <div class="col-12 col-lg-8">
            <div class="card">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-start mb-3 gap-2">
                        <h2 id="title" class="mb-0"></h2>
                        <span id="status"></span>
                    </div>

                    <div id="price" class="fs-2 fw-bold mb-3"></div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <p class="mb-2"><b>Prodavac:</b> <span id="seller"></span></p>
                            <p class="mb-2"><b>Grad:</b> <span id="city"></span></p>
                        </div>
                        <div class="col-md-6">
                            <p class="mb-2"><b>Objavljeno:</b> <span id="publishedAt"></span></p>
                            <p class="mb-2"><b>ID oglasa:</b> <span id="listingId"></span></p>
                        </div>
                    </div>

                    <hr>

                    <h5>Opis</h5>
                    <p id="description" class="mb-0"></p>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="/js/global.js"></script>
<script>
    const id = getIdFromQuery()

    axios.get('/api/listing/' + id)
        .then(rsp => {
            const listing = rsp.data

            document.getElementById('title').innerText = getListingTitle(listing)
            document.getElementById('seller').innerText = getSellerTitle(listing)
            document.getElementById('price').innerText = formatPrice(listing.priceEur)
            document.getElementById('city').innerText = listing.city
            document.getElementById('status').innerHTML = getListingStatusBadge(listing)
            document.getElementById('description').innerText = listing.description
            document.getElementById('publishedAt').innerText = formatDate(listing.publishedAt)
            document.getElementById('listingId').innerText = listing.listingId
        })
        .catch(() => alert('Doslo je do greske'))
</script>
</body>
</html>
