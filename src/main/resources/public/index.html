<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PolovniMini</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <style>
        #content {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }

        .card-body {
            min-height: 180px;
        }
    </style>
</head>

<body data-bs-theme="dark">
<div class="container">
    <nav class="navbar navbar-expand-lg bg-body-tertiary mb-3">
        <div class="container-fluid">
            <a class="navbar-brand" href="/index.html">
                <i class="fa-solid fa-car"></i> PolovniMini
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="/index.html">
                            <i class="fa-solid fa-house"></i> Početna
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/list.html">
                            <i class="fa-solid fa-table"></i> Lista
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/seller.html">
                            <i class="fa-solid fa-user"></i> Prodavci
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/car.html">
                            <i class="fa-solid fa-car-side"></i> Automobili
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div id="content"></div>
</div>

<template id="template">
    <div class="card" style="width: 18rem;">
        <div class="card-body">
            <h5 class="card-title title"></h5>
            <h6 class="card-subtitle mb-2 text-body-secondary price"></h6>
            <p class="card-text seller"></p>
            <p class="card-text city"></p>
            <p class="card-text status"></p>
        </div>
        <div class="card-footer">
            <a href="#" class="btn btn-sm btn-primary details">
                <i class="fa-solid fa-arrow-up-right-from-square"></i> Detalji
            </a>
        </div>
    </div>
</template>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="/js/global.js"></script>
<script>
    const content = document.getElementById('content')
    const template = document.getElementById('template')

    axios.get('/api/listing')
        .then(rsp => {
            rsp.data.forEach(listing => {
                const copy = template.content.cloneNode(true)

                copy.querySelector('.title').innerText = getListingTitle(listing)
                copy.querySelector('.price').innerText = formatPrice(listing.priceEur)
                copy.querySelector('.seller').innerText = getSellerTitle(listing)
                copy.querySelector('.city').innerText = listing.city
                copy.querySelector('.status').innerText = listing.status
                copy.querySelector('.details').href = '/listing.html?id=' + listing.listingId

                content.appendChild(copy)
            })
        })
        .catch(() => alert('Doslo je do greske'))
</script>
</body>

</html>
