<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oglasi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
</head>
<body data-bs-theme="dark">
<div class="container">
    <nav class="navbar navbar-expand-lg bg-body-tertiary mb-4 mt-2">
        <div class="container-fluid">
            <a class="navbar-brand" href="/index.html">
                <i class="fa-solid fa-car"></i> PolovniMini
            </a>

            <div class="navbar-nav">
                <a class="nav-link" href="/index.html">
                    <i class="fa-solid fa-house"></i> Početna
                </a>
                <a class="nav-link active" href="/list.html">
                    <i class="fa-solid fa-table-cells"></i> Lista
                </a>
                <a class="nav-link" href="/seller.html">
                    <i class="fa-solid fa-user"></i> Prodavci
                </a>
                <a class="nav-link" href="/car.html">
                    <i class="fa-solid fa-car-side"></i> Automobili
                </a>
            </div>
        </div>
    </nav>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3 class="mb-0">Svi oglasi</h3>
        <a href="/new/listing.html" class="btn btn-primary">Dodaj oglas</a>
    </div>

    <table class="table table-striped table-hover align-middle">
        <thead>
        <tr>
            <th>ID</th>
            <th>Auto</th>
            <th>Prodavac</th>
            <th>Cena</th>
            <th>Grad</th>
            <th>Status</th>
            <th>Opcije</th>
        </tr>
        </thead>
        <tbody id="content"></tbody>
    </table>
</div>

<template id="template">
    <tr>
        <td class="id"></td>
        <td class="title"></td>
        <td class="seller"></td>
        <td class="price"></td>
        <td class="city"></td>
        <td class="status"></td>
        <td>
            <a href="#" class="btn btn-sm btn-primary details">Detalji</a>
            <a href="#" class="btn btn-sm btn-success edit">Izmeni</a>
            <button class="btn btn-sm btn-warning toggle-status"></button>
            <button class="btn btn-sm btn-danger delete">Obriši</button>
        </td>
    </tr>
</template>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="/js/global.js"></script>
<script>
    const content = document.getElementById('content')
    const template = document.getElementById('template')

    axios.get('/api/listing')
        .then(rsp => {
            rsp.data.forEach(listing => {
                const copy = template.content.cloneNode(true)

                copy.querySelector('.id').innerText = listing.listingId
                copy.querySelector('.title').innerText = getListingTitle(listing)
                copy.querySelector('.seller').innerText = getSellerTitle(listing)
                copy.querySelector('.price').innerText = formatPrice(listing.priceEur)
                copy.querySelector('.city').innerText = listing.city
                copy.querySelector('.status').innerHTML = getListingStatusBadge(listing)
                copy.querySelector('.details').href = '/listing.html?id=' + listing.listingId
                copy.querySelector('.edit').href = '/edit/listing.html?id=' + listing.listingId

                const toggleButton = copy.querySelector('.toggle-status')

                if (listing.sold === true) {
                    toggleButton.innerText = 'Aktiviraj'
                    toggleButton.addEventListener('click', () => {
                        axios.put('/api/listing/' + listing.listingId + '/activate')
                            .then(() => window.location.reload())
                            .catch(() => alert('Doslo je do greske'))
                    })
                } else {
                    toggleButton.innerText = 'Prodato'
                    toggleButton.addEventListener('click', () => {
                        axios.put('/api/listing/' + listing.listingId + '/sold')
                            .then(() => window.location.reload())
                            .catch(() => alert('Doslo je do greske'))
                    })
                }

                copy.querySelector('.delete').addEventListener('click', () => {
                    const confirmed = confirm('Da li ste sigurni da želite da obrišete oglas?')

                    if (!confirmed) {
                        return
                    }

                    axios.delete('/api/listing/' + listing.listingId)
                        .then(() => window.location.reload())
                        .catch(() => alert('Doslo je do greske'))
                })

                content.appendChild(copy)
            })
        })
        .catch(err => {
            console.error(err)
            alert('Doslo je do greske pri ucitavanju oglasa')
        })
</script>
</body>
</html>
